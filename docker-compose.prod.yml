# Production stack for the Hostinger VPS.
#
#   db         — PostgreSQL, NO published port (reachable only inside the compose
#                network; never exposed to the internet).
#   dashboard  — Streamlit, bound to 127.0.0.1:8501 so only the host's nginx can
#                reach it; nginx terminates TLS for census.datallmai.com.
#
# Bring up:        docker compose -f docker-compose.prod.yml up -d --build
# One-off ingest:  docker compose -f docker-compose.prod.yml run --rm dashboard \
#                    python -m pgbigdata.cli ingest-acs --year 2022 --geography county
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  dashboard:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      CENSUS_API_KEY: "${CENSUS_API_KEY:-}"
    ports:
      - "127.0.0.1:8501:8501"   # localhost-only; nginx proxies the public domain

volumes:
  pgdata:
