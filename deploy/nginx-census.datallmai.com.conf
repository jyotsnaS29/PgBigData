# nginx site for the ACS Explorer (Streamlit) on the Hostinger VPS.
# Matches the established *.datallmai.com pattern.
#
# Install:
#   cp deploy/nginx-census.datallmai.com.conf /etc/nginx/sites-available/census.datallmai.com
#   ln -sf /etc/nginx/sites-available/census.datallmai.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d census.datallmai.com   # adds the 443 block + redirect
#
# Optional basic-auth (Census data is public, but to gate the UI):
#   apt-get install -y apache2-utils
#   htpasswd -c /etc/nginx/.htpasswd-census <user>
#   then uncomment the two auth_* lines below and reload nginx.

server {
    listen 80;
    server_name census.datallmai.com;

    # Static documentation served from the repo /docs (rsync'd to this web root):
    #   rsync -a docs/ /var/www/census-docs/
    location = /docs { return 301 /docs/; }
    location /docs/ {
        alias /var/www/census-docs/;
        index index.html;
        try_files $uri $uri/ =404;
        location ~* \.pdf$ { add_header Content-Disposition inline; }
    }

    # Data assistant: static chat UI + streaming FastAPI backend (127.0.0.1:8600).
    location /assistant/api/ {
        proxy_pass http://127.0.0.1:8600/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;          # SSE streaming
        proxy_cache off;
        proxy_read_timeout 600s;
    }
    location = /assistant { return 301 /assistant/; }
    location /assistant/ {
        alias /var/www/census-assistant/;
        index index.html;
        try_files $uri $uri/ /assistant/index.html;
    }

    location / {
        # auth_basic "ACS Explorer";
        # auth_basic_user_file /etc/nginx/.htpasswd-census;

        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit runs over a WebSocket (/_stcore/stream) — these are required.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
